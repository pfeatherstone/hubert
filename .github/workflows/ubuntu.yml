name: Ubuntu

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test
        run: |
          mkdir -p junit
          cd src
          pytest unit.py --doctest-modules --junitxml=../junit/test-results-${{ matrix.os }}.xml

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results-${{ matrix.os }}
          path: junit/test-results-${{ matrix.os }}.xml

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: ${{ always() }}
        with:
          name: PyTorch Unit Tests (${{ matrix.os }})
          path: junit/test-results-${{ matrix.os }}.xml
          reporter: java-junit
          fail-on-error: "false"